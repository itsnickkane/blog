<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">Blog</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    /* ── LP Tracker ─────────────────────────────────────────────────── */
    .tracker-loading { opacity:.5; text-align:center; padding:3rem 0; }
    .tracker-error   { color:#dc2626; padding:1rem 0; }
    .tracker-header-row { display:flex; align-items:baseline; justify-content:space-between; flex-wrap:wrap; gap:.5rem; margin-bottom:1.5rem; }
    .tracker-fetched { font-size:.75rem; opacity:.5; }
    .tracker-refresh { font-size:.78rem; cursor:pointer; opacity:.6; background:none; border:1px solid currentColor; border-radius:6px; padding:.25rem .65rem; }
    .tracker-refresh:hover { opacity:1; }

    .t-chart-wrap { margin-bottom:1.5rem; }
    .t-chart-canvas-wrap { position:relative; height:220px; }
    .t-chart-periods { display:flex; gap:.35rem; margin-bottom:.6rem; }
    .t-period-btn { font-size:.72rem; font-weight:600; padding:.2rem .55rem; border-radius:5px; border:1px solid var(--border,#e5e7eb); background:none; cursor:pointer; opacity:.5; }
    .t-period-btn.active { opacity:1; background:var(--border,#e5e7eb); }
    .t-period-btn:hover { opacity:.8; }

    .t-eth-price { display:flex; flex-direction:column; gap:.2rem; margin-bottom:1.25rem; }
    .t-eth-top   { display:flex; align-items:baseline; gap:.5rem; }
    .t-eth-value { font-size:1.75rem; font-weight:700; }
    .t-eth-label { font-size:.9rem; font-weight:600; opacity:.45; }
    .t-eth-vol   { font-size:.78rem; opacity:.75; }
    .t-vol-lo    { color:#059669; }
    .t-vol-hi    { color:#dc2626; }

    .t-card  { border:1px solid var(--border,#e5e7eb); border-radius:10px; padding:1.5rem; margin-bottom:1.5rem; }
    .t-top   { display:flex; align-items:center; gap:.75rem; margin-bottom:1rem; flex-wrap:wrap; }
    .t-label { font-weight:700; font-size:1rem; }
    .t-pool  { font-size:.8rem; opacity:.55; }
    .t-badge { font-size:.7rem; font-weight:600; padding:.2rem .55rem; border-radius:999px; }
    .t-in    { background:#d1fae5; color:#065f46; }
    .t-out   { background:#fee2e2; color:#991b1b; }

    .t-range-wrap  { margin-bottom:1.25rem; }
    .t-range-label { font-size:.7rem; text-transform:uppercase; letter-spacing:.05em; opacity:.5; margin-bottom:.4rem; }
    .t-range-bounds { display:flex; justify-content:space-between; font-size:.8rem; font-weight:600; margin-bottom:.35rem; }
    .t-range-bar   { position:relative; height:6px; background:var(--border,#e5e7eb); border-radius:3px; }
    .t-range-fill  { position:absolute; inset:0; border-radius:3px; }
    .t-range-fill-in  { background:#d1fae5; }
    .t-range-fill-out { background:#fee2e2; }
    .t-range-marker { position:absolute; top:50%; transform:translate(-50%,-50%); width:10px; height:10px; border-radius:50%; border:2px solid #fff; box-shadow:0 0 0 1px currentColor; }
    .t-range-marker-in  { background:#059669; color:#059669; }
    .t-range-marker-out { background:#dc2626; color:#dc2626; }
    .t-range-distances  { display:flex; justify-content:space-between; font-size:.72rem; opacity:.55; margin-top:.3rem; }

    .t-grid  { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:1rem; }
    .t-metric { display:flex; flex-direction:column; gap:.15rem; }
    .t-mlabel { font-size:.7rem; text-transform:uppercase; letter-spacing:.05em; opacity:.5; }
    .t-mvalue { font-size:1.05rem; font-weight:600; }
    .t-msub   { font-size:.73rem; opacity:.6; }
    .t-divider { border:none; border-top:1px solid var(--border,#e5e7eb); margin:1.25rem 0; }

    .t-bench  { border:1px solid var(--border,#e5e7eb); border-radius:10px; padding:1.5rem; margin-bottom:1.5rem; }
    .t-bench h3 { font-size:.85rem; font-weight:700; margin:0 0 1rem; text-transform:uppercase; letter-spacing:.06em; opacity:.6; }
    .t-brow   { display:flex; justify-content:space-between; align-items:baseline; padding:.3rem 0; font-size:.88rem; border-bottom:1px solid var(--border,#e5e7eb); }
    .t-brow:last-child { border-bottom:none; }
    .t-blabel { opacity:.65; }
    .t-bval   { font-weight:600; }
    .t-pos    { color:#059669; }
    .t-neg    { color:#dc2626; }
  </style>
</head>
<body>

<header class="site-header">
  <div class="site-header-inner">
    <a class="site-title" href="index.html" id="header-title">Blog</a>
    <nav class="site-nav">
      <a href="index.html">Home</a>
    </nav>
  </div>
</header>

<main class="main" id="app"></main>

<script src="posts.js"></script>
<script>
// ── Helpers ──────────────────────────────────────────────────────────────────

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Parse custom video tags inside post content HTML
function parseVideoTags(html) {
  // <youtube id="..." caption="..." />
  html = html.replace(/<youtube\s+id="([^"]+)"(?:\s+caption="([^"]*)")?\s*\/>/gi, (_, id, cap) => {
    return videoEmbed(`https://www.youtube-nocookie.com/embed/${id}?rel=0`, cap);
  });
  // <vimeo id="..." caption="..." />
  html = html.replace(/<vimeo\s+id="([^"]+)"(?:\s+caption="([^"]*)")?\s*\/>/gi, (_, id, cap) => {
    return videoEmbed(`https://player.vimeo.com/video/${id}`, cap);
  });
  // <loom id="..." caption="..." />
  html = html.replace(/<loom\s+id="([^"]+)"(?:\s+caption="([^"]*)")?\s*\/>/gi, (_, id, cap) => {
    return videoEmbed(`https://www.loom.com/embed/${id}`, cap);
  });
  // <vidurl src="..." caption="..." />
  html = html.replace(/<vidurl\s+src="([^"]+)"(?:\s+caption="([^"]*)")?\s*\/>/gi, (_, src, cap) => {
    return videoEmbed(src, cap);
  });
  return html;
}

function videoEmbed(src, caption) {
  const cap = caption ? `<p class="video-caption">${escapeHtml(caption)}</p>` : '';
  return `
    <div class="video-embed">
      <div class="video-wrap">
        <iframe src="${src}" allowfullscreen allow="autoplay; fullscreen; picture-in-picture"></iframe>
      </div>
      ${cap}
    </div>`;
}

function formatDate(dateStr) {
  return dateStr; // already formatted in posts.js
}

// ── Views ────────────────────────────────────────────────────────────────────

function renderHome() {
  document.title = SITE_TITLE;
  document.getElementById('header-title').textContent = SITE_TITLE;

  const sorted = [...POSTS].sort((a, b) => new Date(b.date) - new Date(a.date));

  const items = sorted.map(p => `
    <li class="post-list-item">
      <span class="post-list-date">${p.date}</span>
      <a class="post-list-title" href="?post=${p.id}">${escapeHtml(p.title)}</a>
    </li>`).join('');

  document.getElementById('app').innerHTML = `
    <div class="home-intro">
      <p>${escapeHtml(SITE_TAGLINE)}</p>
    </div>
    <ul class="post-list">${items}</ul>`;
}

function renderPost(id) {
  const post = POSTS.find(p => p.id === id);
  document.getElementById('header-title').textContent = SITE_TITLE;

  if (!post) {
    document.title = 'Not Found';
    document.getElementById('app').innerHTML = `
      <div class="not-found">
        <p>Post not found.</p>
        <p><a href="index.html">← Back home</a></p>
      </div>`;
    return;
  }

  document.title = `${post.title} — ${SITE_TITLE}`;

  const tags = (post.tags || []).map(t => `<span class="post-tag">${escapeHtml(t)}</span>`).join(' ');

  document.getElementById('app').innerHTML = `
    <a class="back-link" href="index.html">← All posts</a>
    <article>
      <header class="post-header">
        <h1 class="post-title">${escapeHtml(post.title)}</h1>
        <div class="post-meta">
          <span>${post.date}</span>
          ${tags}
        </div>
      </header>
      <div class="post-body">${parseVideoTags(post.content)}</div>
    </article>`;

  if (post.type === 'tracker') initTracker();
}

// ── LP Tracker ────────────────────────────────────────────────────────────────

function usdFmt(n)  { return '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits:2, maximumFractionDigits:2 }) }
function pctFmt(n)  { const s=(n*100).toFixed(2); return (n>=0?'+':'')+s+'%' }
function signCls(n) { return n>=0?'t-pos':'t-neg' }
function pf(n,d=4)  { return Number(n).toFixed(d) }

function buildEthPrice(positions) {
  const ethPrice = positions[0]?.currentPrice ?? 0
  const vol      = positions[0]?.vol ?? null
  function changeSpan(change, label) {
    const arrow = change >  0.005 ? `<span class="t-vol-lo">▲</span>`
                : change < -0.005 ? `<span class="t-vol-hi">▼</span>`
                : `<span style="opacity:.35">→</span>`
    const sign = change >= 0 ? '+' : ''
    return `${arrow} ${sign}${pf(change*100,1)}% ${label}`
  }
  const volSub = vol
    ? `${changeSpan(vol.dailyChange,'1d')} · ${changeSpan(vol.weeklyChange,'7d')} · ${changeSpan(vol.monthlyChange,'30d')}`
    : '—'
  return `
  <div class="t-eth-price">
    <div class="t-eth-top">
      <span class="t-eth-value">${usdFmt(ethPrice)}</span>
      <span class="t-eth-label">ETH</span>
    </div>
    <span class="t-eth-vol">${volSub}</span>
  </div>`
}

function buildSummary(positions) {
  const totalPrincipal = positions.reduce((s,p) => s + p.principalUSD, 0)
  const totalFees      = positions.reduce((s,p) => s + p.feesUSD, 0)
  const weightedC      = positions.reduce((s,p) => s + p.concentration * p.principalUSD, 0) / (totalPrincipal || 1)
  const weightedAPR    = positions.reduce((s,p) => s + p.feeAPR * p.principalUSD, 0) / (totalPrincipal || 1)
  const inRangeCount   = positions.filter(p => p.inRange).length
  const wethPrincipal  = positions.reduce((s,p) => s + (p.sym0==='WETH' ? p.amount0 : p.amount1), 0)
  const usdcPrincipal  = positions.reduce((s,p) => s + (p.sym0==='USDC' ? p.amount0 : p.sym1==='USDC' ? p.amount1 : 0), 0)
  const wethFees       = positions.reduce((s,p) => s + (p.sym0==='WETH' ? p.fees0 : p.fees1), 0)
  const usdcFees       = positions.reduce((s,p) => s + (p.sym0==='USDC' ? p.fees0 : p.sym1==='USDC' ? p.fees1 : 0), 0)
  const totalContributed = positions.reduce((s,p) => s + p.capitalDeployed, 0)
  const roi = totalContributed > 0 ? (totalPrincipal - totalContributed) / totalContributed : 0

  return `
  <div class="t-card" style="margin-bottom:2rem">
    <div class="t-top" style="margin-bottom:1.25rem">
      <span class="t-label">Portfolio Summary</span>
      <span class="t-badge ${inRangeCount===positions.length?'t-in':'t-out'}">${inRangeCount}/${positions.length} in range</span>
    </div>
    <div class="t-grid">
      <div class="t-metric"><span class="t-mlabel">Total Principal</span><span class="t-mvalue">${usdFmt(totalPrincipal)}</span><span class="t-msub">${pf(wethPrincipal,4)} WETH · ${pf(usdcPrincipal,2)} USDC</span></div>
      <div class="t-metric"><span class="t-mlabel">Total Contributed</span><span class="t-mvalue">${usdFmt(totalContributed)}</span><span class="t-msub">capital deployed</span></div>
      <div class="t-metric"><span class="t-mlabel">ROI</span><span class="t-mvalue ${signCls(roi)}">${pctFmt(roi)}</span><span class="t-msub">principal / contributed</span></div>
      <div class="t-metric"><span class="t-mlabel">Uncollected Fees</span><span class="t-mvalue">${usdFmt(totalFees)}</span><span class="t-msub">${pf(wethFees,5)} WETH · ${pf(usdcFees,2)} USDC</span></div>
      <div class="t-metric"><span class="t-mlabel">Fee APR</span><span class="t-mvalue t-pos">${pctFmt(weightedAPR)}</span><span class="t-msub">capital-weighted</span></div>
      <div class="t-metric"><span class="t-mlabel">Avg Concentration</span><span class="t-mvalue">${pf(weightedC,2)}×</span><span class="t-msub">capital-weighted</span></div>
    </div>
  </div>`
}

function buildHarvest(h, totalContributed) {
  if (!h) return ''
  const dash = `<span style="opacity:.3">—</span>`
  const wethLine = h.totalWethCollected > 0 ? pf(h.totalWethCollected,5) : dash
  const usdcLine = h.totalUsdcCollected > 0 ? usdFmt(h.totalUsdcCollected) : dash
  const totalLine = h.totalHarvestUSD > 0 ? usdFmt(h.totalHarvestUSD) : dash
  const cocRaw    = totalContributed > 0 ? h.totalHarvestUSD / totalContributed : 0
  const cocLine   = cocRaw > 0 ? pctFmt(cocRaw) : dash

  return `
  <div class="t-bench" style="margin-bottom:1.5rem">
    <h3>Harvested Returns</h3>
    <div class="t-brow"><span class="t-blabel">WETH</span><span class="t-bval">${wethLine}</span></div>
    <div class="t-brow"><span class="t-blabel">USDC</span><span class="t-bval">${usdcLine}</span></div>
    <div class="t-brow"><span class="t-blabel">Total harvest value</span><span class="t-bval">${totalLine}</span></div>
    <div class="t-brow"><span class="t-blabel">Cash-on-cash return</span><span class="t-bval ${cocRaw > 0 ? 't-pos' : ''}">${cocLine}</span></div>
  </div>`
}

function buildPosition(p) {
  const volLine = p.vol
    ? `d ${pf(p.vol.dailyVol*100,2)}% · w ${pf(p.vol.dailyVol*Math.sqrt(7)*100,2)}% · m ${pf(p.vol.monthlyVol*100,2)}%`
    : '—'

  // Range bar: clamp current price position to 0–100%
  const pos = Math.min(100, Math.max(0,
    (p.currentPrice - p.priceLower) / (p.priceUpper - p.priceLower) * 100
  ))
  const pctToLower = ((p.currentPrice - p.priceLower) / p.currentPrice * 100).toFixed(1)
  const pctToUpper = ((p.priceUpper - p.currentPrice) / p.currentPrice * 100).toFixed(1)
  const markerCls  = p.inRange ? 't-range-marker-in' : 't-range-marker-out'
  const fillCls    = p.inRange ? 't-range-fill-in'   : 't-range-fill-out'

  return `
  <div class="t-card">
    <div class="t-top">
      <span class="t-badge ${p.inRange?'t-in':'t-out'}">${p.inRange?'✓ In Range':'⚠ Out of Range'}</span>
      <span class="t-label">${usdFmt(p.priceLower)} – ${usdFmt(p.priceUpper)}</span>
      <span class="t-pool">${p.pool} · ${p.fee}%</span>
    </div>
    <div class="t-range-wrap">
      <div class="t-range-bar">
        <div class="t-range-fill ${fillCls}" style="left:0;right:0"></div>
        <div class="t-range-marker ${markerCls}" style="left:${pos}%"></div>
      </div>
      <div class="t-range-distances">
        <span>▲ ${pctToLower}% to lower</span>
        <span>${usdFmt(p.currentPrice)}</span>
        <span>${pctToUpper}% to upper ▲</span>
      </div>
    </div>
    <div class="t-grid">
      <div class="t-metric"><span class="t-mlabel">Total Principal</span><span class="t-mvalue">${usdFmt(p.principalUSD)}</span><span class="t-msub">${pf(p.amount0,4)} ${p.sym0} · ${pf(p.amount1,2)} ${p.sym1}</span></div>
      <div class="t-metric"><span class="t-mlabel">Total Contributed</span><span class="t-mvalue">${usdFmt(p.capitalDeployed)}</span><span class="t-msub">capital deployed</span></div>
      <div class="t-metric"><span class="t-mlabel">ROI</span><span class="t-mvalue ${signCls(p.roiPct)}">${pctFmt(p.roiPct)}</span><span class="t-msub">${pf(p.daysActive,1)} days active</span></div>
      <div class="t-metric"><span class="t-mlabel">Uncollected Fees</span><span class="t-mvalue">${usdFmt(p.feesUSD)}</span><span class="t-msub">${pf(p.fees0,5)} ${p.sym0} · ${pf(p.fees1,2)} ${p.sym1}</span></div>
      <div class="t-metric"><span class="t-mlabel">Fee APR</span><span class="t-mvalue t-pos">${pctFmt(p.feeAPR)}</span><span class="t-msub">annualised</span></div>
      <div class="t-metric"><span class="t-mlabel">Concentration</span><span class="t-mvalue">${pf(p.concentration,2)}×</span><span class="t-msub">vs full-range</span></div>
      <div class="t-metric"><span class="t-mlabel">σ to Edge</span><span class="t-mvalue" style="font-size:.88rem">${pf(p.sigmaToLower,2)}σ ↓ · ${pf(p.sigmaToUpper,2)}σ ↑</span><span class="t-msub">monthly std devs</span></div>
    </div>
  </div>`
}

function buildBenchmarks(bm, lpTotal) {
  if (!bm) return ''
  const vsEth      = lpTotal - bm.ethValueUSD
  const vsFiftyFif = lpTotal - bm.fiftyFiftyValueUSD
  const costBasis  = bm.ethHeld > 0 ? bm.totalContributed / bm.ethHeld : 0
  const rows = bm.details.map(d =>
    `<div class="t-brow"><span class="t-blabel">${d.date} entry</span><span class="t-bval">${pf(d.ethBought,4)} ETH @ ${usdFmt(d.priceAtEntry)}</span></div>`
  ).join('')
  return `
  <div class="t-bench">
    <h3>Portfolio Benchmarks</h3>
    <div class="t-brow"><span class="t-blabel">ETH cost basis</span><span class="t-bval">${usdFmt(costBasis)}</span></div>
    <div class="t-brow"><span class="t-blabel">Total contributed</span><span class="t-bval">${usdFmt(bm.totalContributed)}</span></div>
    <div class="t-brow"><span class="t-blabel">LP + harvest value</span><span class="t-bval">${usdFmt(lpTotal)}</span></div>
    <hr class="t-divider" style="margin:.75rem 0">
    <div class="t-brow"><span class="t-blabel">A · 100% ETH DCA (${pf(bm.ethHeld,4)} ETH)</span><span class="t-bval">${usdFmt(bm.ethValueUSD)}</span></div>
    <div class="t-brow"><span class="t-blabel">LP vs ETH</span><span class="t-bval ${signCls(vsEth)}">${usdFmt(vsEth)} (${pctFmt(vsEth/bm.ethValueUSD)})</span></div>
    <hr class="t-divider" style="margin:.75rem 0">
    <div class="t-brow"><span class="t-blabel">B · 50/50 ETH/USDC DCA</span><span class="t-bval">${usdFmt(bm.fiftyFiftyValueUSD)}</span></div>
    <div class="t-brow"><span class="t-blabel">LP vs 50/50</span><span class="t-bval ${signCls(vsFiftyFif)}">${usdFmt(vsFiftyFif)} (${pctFmt(vsFiftyFif/bm.fiftyFiftyValueUSD)})</span></div>
    <hr class="t-divider" style="margin:.75rem 0">
    ${rows}
  </div>`
}

async function loadTracker() {
  const root = document.getElementById('tracker-root')
  if (!root) return
  root.innerHTML = '<p class="tracker-loading">Fetching live on-chain data…</p>'
  const fetched = document.getElementById('tracker-fetched')
  if (fetched) fetched.textContent = ''
  try {
    const data = await fetch('/api/positions').then(r => r.json())
    if (!data.ok) throw new Error(data.error)
    const lpTotal = data.positions.reduce((s,p) => s + p.totalUSD, 0)
    const totalContributed = data.positions.reduce((s,p) => s + p.capitalDeployed, 0)
    const harvestUSD = data.harvest?.totalHarvestUSD ?? 0
    const ethPriceEl = document.getElementById('tracker-eth-price')
    if (ethPriceEl) ethPriceEl.innerHTML = buildEthPrice(data.positions)
    root.innerHTML = buildSummary(data.positions) + buildHarvest(data.harvest, totalContributed) + data.positions.map(buildPosition).join('') + buildBenchmarks(data.benchmarks, lpTotal + harvestUSD)
      || '<p class="tracker-loading">No active positions found.</p>'
    if (fetched) fetched.textContent = 'updated ' + new Date(data.fetchedAt).toLocaleTimeString()
  } catch(e) {
    root.innerHTML = `<p class="tracker-error">Error: ${e.message}</p>`
  }
}

function computeBollingerBands(prices) {
  const period = Math.min(20, Math.max(3, Math.floor(prices.length / 3)))
  return prices.map((_, i) => {
    if (i < period - 1) return { upper: null, lower: null }
    const slice = prices.slice(i - period + 1, i + 1)
    const ma  = slice.reduce((s, v) => s + v, 0) / period
    const std = Math.sqrt(slice.reduce((s, v) => s + (v - ma) ** 2, 0) / period)
    return { upper: ma + 2 * std, lower: ma - 2 * std }
  })
}

let ethChart = null
const chartCache = {}

async function loadChart(days) {
  document.querySelectorAll('.t-period-btn').forEach(b =>
    b.classList.toggle('active', String(b.dataset.days) === String(days))
  )
  const canvasWrap = document.querySelector('.t-chart-canvas-wrap')
  try {
    let data = chartCache[days]
    if (!data) {
      const res = await fetch(`/api/chart?days=${days}`)
      data = await res.json()
      if (!data.ok) throw new Error(data.error)
      chartCache[days] = data
    }

    const numDays = days === 'max' ? Infinity : Number(days)
    const prices  = data.prices.map(([, p]) => p)
    const volumes = data.total_volumes.map(([, v]) => v)
    if (canvasWrap) canvasWrap.style.display = ''
    const labels  = data.prices.map(([t]) => {
      const d = new Date(t)
      if (numDays <= 2)   return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
      if (numDays <= 90)  return d.toLocaleDateString([], { month: 'short', day: 'numeric' })
      if (numDays <= 365) return d.toLocaleDateString([], { month: 'short', year: '2-digit' })
      return d.toLocaleDateString([], { year: 'numeric' })
    })

    const avg   = prices.reduce((s, v) => s + v, 0) / prices.length
    const avgEl = document.getElementById('chart-avg-label')
    if (avgEl) avgEl.textContent = `Avg $${Math.round(avg).toLocaleString()}`

    const bb    = computeBollingerBands(prices)
    const upper = bb.map(b => b.upper)
    const lower = bb.map(b => b.lower)
    const avgLine = prices.map(() => avg)

    const datasets = [
      { label: 'BB Upper', data: upper,   borderColor: 'rgba(99,102,241,.2)', borderWidth: 1, pointRadius: 0, fill: 1, backgroundColor: 'rgba(99,102,241,.07)', tension: .3, yAxisID: 'y', order: 2 },
      { label: 'BB Lower', data: lower,   borderColor: 'rgba(99,102,241,.2)', borderWidth: 1, pointRadius: 0, fill: false, tension: .3, yAxisID: 'y', order: 2 },
      { label: 'ETH',      data: prices,  borderColor: 'rgb(99,102,241)', borderWidth: 2, pointRadius: 0, fill: false, tension: .3, yAxisID: 'y', order: 1 },
      { label: 'Avg',      data: avgLine, borderColor: 'rgba(156,163,175,.7)', borderWidth: 1, borderDash: [5, 4], segment: { borderDash: [5,4] }, pointRadius: 0, fill: false, tension: 0, yAxisID: 'y', order: 2 },
      { label: 'Volume',   data: volumes, type: 'bar', backgroundColor: 'rgba(156,163,175,.25)', yAxisID: 'yVol', order: 3 },
    ]

    if (ethChart) {
      ethChart.data.labels   = labels
      ethChart.data.datasets = datasets
      ethChart.update('none')
    } else {
      const ctx = document.getElementById('eth-chart')
      if (!ctx) return
      ethChart = new Chart(ctx, {
        type: 'line',
        data: { labels, datasets },
        options: {
          responsive: true, maintainAspectRatio: false, animation: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: c => {
                  if (c.dataset.label === 'ETH')    return ` $${c.parsed.y.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}`
                  if (c.dataset.label === 'Volume') return ` Vol $${(c.parsed.y/1e9).toFixed(1)}B`
                  if (c.dataset.label === 'Avg')    return null
                  return null
                }
              }
            }
          },
          scales: {
            x: {
              grid: { display: false },
              ticks: { maxTicksLimit: 6, font: { size: 10 }, color: 'rgba(0,0,0,.4)' }
            },
            y: {
              position: 'right',
              grid: { color: 'rgba(0,0,0,.04)' },
              ticks: { font: { size: 10 }, color: 'rgba(0,0,0,.4)', callback: v => '$' + Math.round(v).toLocaleString() }
            },
            yVol: {
              position: 'left',
              grid: { display: false },
              ticks: { display: false },
              afterDataLimits: s => { s.max = s.max * 5 }
            }
          }
        }
      })
    }
  } catch(e) {
    console.error('Chart error', e)
    if (canvasWrap) canvasWrap.innerHTML = `<p style="opacity:.5;font-size:.8rem;padding:1rem 0">Chart unavailable: ${e.message}</p>`
  }
}

function initTracker() {
  const postBody = document.querySelector('.post-body')
  if (!postBody) return
  if (ethChart) { try { ethChart.destroy() } catch {} ethChart = null }

  const header = document.createElement('div')
  header.innerHTML = `
    <div class="tracker-header-row">
      <span class="tracker-fetched" id="tracker-fetched"></span>
      <button class="tracker-refresh" onclick="loadTracker()">↻ Refresh</button>
    </div>
    <div id="tracker-eth-price"></div>
    <div class="t-chart-wrap">
      <div class="t-chart-periods">
        <button class="t-period-btn active" data-days="1"    onclick="loadChart(1)">1D</button>
        <button class="t-period-btn"        data-days="7"    onclick="loadChart(7)">7D</button>
        <button class="t-period-btn"        data-days="30"   onclick="loadChart(30)">30D</button>
        <button class="t-period-btn"        data-days="90"   onclick="loadChart(90)">90D</button>
        <button class="t-period-btn"        data-days="180"  onclick="loadChart(180)">6M</button>
        <button class="t-period-btn"        data-days="365"  onclick="loadChart(365)">1Y</button>
        <button class="t-period-btn"        data-days="730"  onclick="loadChart(730)">2Y</button>
        <button class="t-period-btn"        data-days="1095" onclick="loadChart(1095)">3Y</button>
        <button class="t-period-btn"        data-days="1460" onclick="loadChart(1460)">4Y</button>
        <button class="t-period-btn"        data-days="1825" onclick="loadChart(1825)">5Y</button>
        <button class="t-period-btn"        data-days="max"  onclick="loadChart('max')">Max</button>
      </div>
      <div class="t-chart-canvas-wrap">
        <div id="chart-avg-label" style="position:absolute;top:.5rem;left:.5rem;font-size:.72rem;font-weight:600;opacity:.65;pointer-events:none;z-index:1"></div>
        <canvas id="eth-chart"></canvas>
      </div>
    </div>`
  postBody.insertBefore(header, postBody.firstChild)
  loadTracker()
  loadChart(1)
}

// ── Router ───────────────────────────────────────────────────────────────────

function route() {
  const params = new URLSearchParams(location.search);
  const postId = params.get('post');
  if (postId) {
    renderPost(postId);
  } else {
    renderHome();
  }
}

window.addEventListener('popstate', route);
route();
</script>
</body>
</html>
